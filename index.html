<head>
<meta charset="utf-8" />

<!-- Small screens → mobile version (unless ?web=1 forces desktop) -->
<script>
  (function(){
    try{
      var forceWeb = /[?&]web=1/.test(location.search);
      if(!forceWeb && Math.min(window.innerWidth, window.screen.width) < 760){
        location.replace('mobile.html');
      }
    }catch(e){}
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg: #EFEDE6;
    --panel: #FAFAF7;
    --surface: #FFFFFF;
    --ink: #0F1614;
    --ink-2: #2A3330;
    --muted: #707974;
    --line: #E5E2D9;
    --line-2: #D7D3C7;
    --accent: #0E9384;
    --accent-ink: #064E47;
    --accent-soft: #DCF1ED;
    --warn: #C8651B;
    --danger: #B5453C;
    --A: #E25858;
    --T: #4F94D8;
    --G: #EAA532;
    --C: #4FB37E;
    --U: #9C77C7;
    --N: #A8A89B;
  }
  html, body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Manrope','Noto Sans TC',-apple-system,system-ui,sans-serif; }
  body{ background: var(--bg); color: var(--ink); }
  *{ box-sizing: border-box; }

  /* ───────── Web (desktop) shell — sidebar + main ───────── */
  .web-shell{
    display: flex;
    width: 100%;
    min-height: 100vh;
  }
  .web-sidebar{
    width: 248px;
    flex-shrink: 0;
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    padding: 26px 16px 18px;
  }
  .web-brand{
    display: flex; align-items: center; gap: 11px;
    padding: 0 8px 22px;
  }
  .web-brand-mark{
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), #6CD0A5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 20px;
    font-family: 'JetBrains Mono', monospace;
    box-shadow: 0 6px 18px rgba(14,147,132,.25);
  }
  .web-nav{
    display: flex; flex-direction: column; gap: 4px;
    flex: 1;
  }
  .web-nav-item{
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; border-radius: 12px;
    border: none; background: transparent;
    cursor: pointer; text-align: left;
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    transition: background .15s;
  }
  .web-nav-item:hover{ background: rgba(0,0,0,.035); }
  .web-nav-item.on:hover{ background: var(--accent-soft); }
  .web-nav-icon{ display: flex; align-items: center; }
  .web-nav-label{ flex: 1; font-size: 15px; font-weight: 600; }
  .web-nav-no{ font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; }
  .web-side-foot{ padding: 16px 8px 4px; }
  .web-mobile-link{
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 13px; border-radius: 10px;
    font-size: 12.5px; font-weight: 600; text-decoration: none;
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    transition: background .15s;
  }
  .web-mobile-link:hover{ background: rgba(0,0,0,.04); }

  .web-main{
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .web-col{
    margin: 0 auto;
    padding: 0 24px;
  }

  [data-dark] .web-nav-item:hover{ background: rgba(255,255,255,.05); }

  #app-root{ width: 100%; }
</style>
</head>
<body>

<div id="app-root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="flashcards.jsx"></script>
<script type="text/babel" src="quiz-bank.jsx"></script>
<script type="text/babel" src="blast.jsx"></script>
<script type="text/babel" src="tools.jsx"></script>
<script type="text/babel" src="lessons.jsx"></script>
<script type="text/babel" src="study.jsx"></script>
<script type="text/babel" src="profiles.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app-web.jsx"></script>

<script>
  window.__BIOLEARN_TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "magenta",
    "dark": false,
    "fontScale": 1,
    "showStreak": true
  }/*EDITMODE-END*/;
</script>

</body>
</html>
